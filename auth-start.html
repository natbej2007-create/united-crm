<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Signing in...</title>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<script src="https://res.cdn.office.net/teams-js/2.19.0/js/MicrosoftTeams.min.js"></script>
</head>
<body style="font-family:system-ui;color:#26276D;padding:24px">
Signing you in...
<script>
var SCOPES = ["Sites.ReadWrite.All"];
(async function(){
  await microsoftTeams.app.initialize();
  var pca = new msal.PublicClientApplication({
    auth:{
      clientId:"08b5f379-bc54-423b-b9fd-72242cfe908b",
      authority:"https://login.microsoftonline.com/720752f2-761f-405d-866a-efdb633125d9",
      redirectUri: window.location.origin + window.location.pathname
    },
    cache:{ cacheLocation:"localStorage" }
  });
  // Returning from the AAD redirect: hand the Graph token back to the app.
  var resp = await pca.handleRedirectPromise();
  if(resp && resp.accessToken){
    microsoftTeams.authentication.notifySuccess(resp.accessToken);
    return;
  }
  // Already have a session in this popup: get a fresh token silently.
  var acct = pca.getAllAccounts()[0];
  if(acct){
    try{
      var r = await pca.acquireTokenSilent({ account:acct, scopes:SCOPES });
      microsoftTeams.authentication.notifySuccess(r.accessToken);
      return;
    }catch(e){ /* fall through to interactive */ }
  }
  // First time: go to the Microsoft sign-in, then come back here.
  pca.loginRedirect({ scopes:SCOPES });
})().catch(function(e){
  try{ microsoftTeams.authentication.notifyFailure(String(e)); }catch(_){}
});
</script>
</body>
</html>
