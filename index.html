<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>United Services CRM</title>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
  :root{
    --navy:#26276D; --navy-d:#1c1d52; --cyan:#27AAE1; --cyan-d:#0e87bd;
    --bg:#eef1f8; --panel:#ffffff; --soft:#f4f6fb; --line:#e3e8f2;
    --txt:#1f2440; --mut:#6b7385; --hint:#9aa0b0;
    --green:#15803d; --amber:#b45309; --red:#dc2626;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
  .app{display:flex;flex-direction:column;height:100vh}
  /* top bar */
  .top{display:flex;align-items:center;gap:14px;background:var(--navy);border-bottom:3px solid var(--cyan);padding:0 16px;height:52px;flex:0 0 auto}
  .brand{font-weight:500;font-size:15px;letter-spacing:2px;color:var(--cyan)}
  .brand span{color:#fff}
  .topsearch{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.14);border-radius:7px;padding:6px 11px;width:300px;max-width:38vw}
  .topsearch input{background:none;border:none;outline:none;color:#fff;font-size:13px;width:100%}
  .topsearch input::placeholder{color:#b9c0e6}
  .avatar{margin-left:auto;width:30px;height:30px;border-radius:50%;background:var(--cyan);color:#0b3a4a;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:12px}
  /* layout */
  .body{display:flex;flex:1;min-height:0}
  .queue{width:360px;flex:0 0 auto;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column}
  .qhead{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-bottom:1px solid var(--line)}
  .qhead h2{margin:0;font-size:14px;font-weight:500;color:var(--navy)}
  .qhead .cnt{color:var(--mut);font-weight:400}
  .btn{cursor:pointer;border:none;border-radius:7px;font-weight:500;font-size:12px;padding:6px 11px}
  .btn.primary{background:var(--navy);color:#fff}
  .btn.primary:hover{background:var(--navy-d)}
  .btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--cyan);color:var(--cyan-d)}
  .qfilters{display:flex;gap:6px;flex-wrap:wrap;padding:9px 13px;border-bottom:1px solid var(--line)}
  .qfilters select{font-size:12px;padding:5px 7px;border:1px solid var(--line);border-radius:6px;background:var(--soft);color:var(--txt);outline:none}
  .qfilters select:focus{border-color:var(--cyan)}
  .qlist{overflow-y:auto;flex:1}
  .crow{display:flex;flex-direction:column;gap:4px;padding:9px 13px;border-bottom:1px solid var(--line);cursor:pointer}
  .crow:hover{background:var(--soft)}
  .crow.active{background:#eaf6fc;border-left:3px solid var(--cyan);padding-left:10px}
  .crow .nm{font-size:13px;font-weight:500;color:var(--navy)}
  .crow .sub{font-size:11px;color:var(--mut)}
  .pills{display:flex;gap:4px;flex-wrap:wrap}
  .pill{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500;white-space:nowrap}
  .p-tier{background:#e7e7f3;color:var(--navy)}
  .p-rel{background:#e2f4fc;color:var(--cyan-d)}
  .p-stage{background:#eef0f6;color:#4a5169}
  .fit-Strategic{background:#dde9ff;color:#1d4ed8}
  .fit-High{background:#dcfce7;color:#15803d}
  .fit-Medium{background:#fef3c7;color:#b45309}
  /* detail */
  .detail{flex:1;min-width:0;overflow-y:auto;background:var(--bg)}
  .empty{color:var(--mut);text-align:center;margin-top:20vh}
  .dhead{background:var(--panel);border-bottom:1px solid var(--line);padding:16px 22px}
  .dhead .row1{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
  .dhead h1{margin:0;font-size:20px;font-weight:500;color:var(--navy)}
  .dhead .meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:8px}
  .loc{font-size:12px;color:var(--mut)}
  .tabs{display:flex;gap:20px;padding:0 22px;background:var(--panel);border-bottom:1px solid var(--line)}
  .tab{font-size:13px;padding:11px 0;color:var(--mut);cursor:pointer;border-bottom:2px solid transparent;font-weight:500}
  .tab.active{color:var(--navy);border-bottom-color:var(--cyan)}
  .tab .c{color:var(--hint);font-weight:400}
  .tabwrap{padding:18px 22px;max-width:900px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:14px}
  .card h3{margin:0 0 12px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--navy)}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px 20px}
  .f label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.4px;color:var(--hint);margin-bottom:3px}
  .f .v{font-size:13px;word-break:break-word}
  .f .v a{color:var(--cyan-d);text-decoration:none}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--hint);padding:7px 8px;border-bottom:1px solid var(--line)}
  td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top;font-size:13px}
  tr:last-child td{border-bottom:none}
  .status{display:inline-flex;align-items:center;gap:6px;font-weight:500;font-size:12px}
  .dot{width:8px;height:8px;border-radius:50%}
  .s-signed{color:var(--green)} .s-signed .dot{background:var(--green)}
  .s-pending,.s-draft{color:var(--amber)} .s-pending .dot,.s-draft .dot{background:var(--amber)}
  .s-none,.s-expired{color:var(--red)} .s-none .dot,.s-expired .dot{background:var(--red)}
  .avatarsm{width:30px;height:30px;border-radius:50%;background:#e7e7f3;color:var(--navy);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex:0 0 auto}
  .add-link{color:var(--cyan-d);cursor:pointer;font-weight:500;font-size:13px}
  .icon-btn{background:none;border:none;color:var(--mut);cursor:pointer;font-size:12px;padding:2px 6px}
  .icon-btn:hover{color:var(--cyan-d)}
  .row-actions{text-align:right;white-space:nowrap}
  .note{color:var(--mut);font-size:12px;white-space:pre-wrap}
  .banner{background:#eaf6fc;border:1px solid #bfe4f5;color:#0e6b95;padding:9px 12px;border-radius:8px;font-size:12px;margin-bottom:14px}
  /* modal */
  .mbg{position:fixed;inset:0;background:rgba(31,36,64,.45);display:none;align-items:center;justify-content:center;z-index:50}
  .mbg.open{display:flex}
  .modal{background:var(--panel);border-radius:12px;width:560px;max-width:92vw;max-height:88vh;overflow-y:auto;padding:20px}
  .modal h3{margin:0 0 14px;color:var(--navy)}
  .modal .f{margin-bottom:11px}
  .modal input,.modal select,.modal textarea{width:100%;padding:9px 11px;background:var(--soft);border:1px solid var(--line);color:var(--txt);border-radius:7px;font-size:13px;font-family:inherit}
  .modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:var(--cyan)}
  .modal textarea{min-height:64px;resize:vertical}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .mfoot{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
  .cf-row{display:flex;gap:8px;margin-top:10px}
  .cf-row input{flex:1}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="brand">UNITED <span>SERVICES</span></div>
    <div class="topsearch"><span style="color:#b9c0e6">&#9906;</span><input id="search" placeholder="Search companies, contacts..." oninput="render()"/></div>
    <div class="avatar">GL</div>
  </div>
  <div class="body">
    <aside class="queue">
      <div class="qhead">
        <h2>Companies <span class="cnt" id="cnt"></span></h2>
        <button class="btn primary" onclick="openCompany()">+ New</button>
      </div>
      <div class="qfilters">
        <select id="fRel" onchange="render()"></select>
        <select id="fTier" onchange="render()"></select>
        <select id="fFit" onchange="render()"></select>
        <select id="fStage" onchange="render()"></select>
      </div>
      <div class="qlist" id="qlist"></div>
    </aside>
    <main class="detail" id="detail"><div class="empty">Select a company from the list.</div></main>
  </div>
</div>
<div class="mbg" id="m1"><div class="modal" id="m1in"></div></div>
<div class="mbg" id="m2"><div class="modal" id="m2in"></div></div>

    else{const r=await graph("/sites/"+SITE+"/lists/Companies/items",{method:"POST",body:JSON.stringify({fields})});const n=Object.assign({id:r.id,spId:r.id,custom:[],contacts:[],docs:[],events:[]},d);DB.companies.unshift(n);sel=n.id;}
  }catch(e){alert("Save failed: "+(e.message||e));}
  render();detailView()}
async function delCompany(cid){if(!confirm("Delete this company?"))return;const c=DB.companies.find(x=>x.id===cid);try{await graph("/sites/"+SITE+"/lists/Companies/items/"+c.spId,{method:"DELETE"});}catch(e){alert("Delete failed: "+(e.message||e));return;}DB.companies=DB.companies.filter(x=>x.id!==cid);if(sel===cid)sel=null;render();detailView()}
function openSub(kind,sid){const c=company();let rec,title,fields;
  if(kind==="contact"){rec=sid?c.contacts.find(x=>x.id===sid):{name:"",role:"",email:"",phone:"",linkedin:"",last:"",notes:""};title=sid?"Edit contact":"Add contact";
    fields=`<div class="f"><label style="font-size:11px;color:var(--mut)">Name *</label><input id="y_name" value="${esc(rec.name)}"/></div>
    <div class="g2"><div class="f"><label style="font-size:11px;color:var(--mut)">Role</label><input id="y_role" value="${esc(rec.role)}"/></div>
    <div class="f"><label style="font-size:11px;color:var(--mut)">Last contact</label><input id="y_last" type="date" value="${esc(rec.last)}"/></div>
    <div class="f"><label style="font-size:11px;color:var(--mut)">Email</label><input id="y_email" value="${esc(rec.email)}"/></div>
    <div class="f"><label style="font-size:11px;color:var(--mut)">Phone</label><input id="y_phone" value="${esc(rec.phone)}"/></div></div>
    <div class="f"><label style="font-size:11px;color:var(--mut)">LinkedIn</label><input id="y_linkedin" value="${esc(rec.linkedin||'')}"/></div>
    <div class="f"><label style="font-size:11px;color:var(--mut)">Notes</label><textarea id="y_notes">${esc(rec.notes)}</textarea></div>`}
  if(kind==="doc"){rec=sid?c.docs.find(x=>x.id===sid):{type:DOCT[0],status:DOCS[1],date:"",link:""};title=sid?"Edit document":"Add document";
    fields=`<div class="g2"><div class="f"><label style="font-size:11px;color:var(--mut)">Type</label><select id="y_type">${selo(DOCT,rec.type)}</select></div>
    <div class="f"><label style="font-size:11px;color:var(--mut)">Status</label><select id="y_status">${selo(DOCS,rec.status)}</select></div>
    <div class="f"><label style="font-size:11px;color:var(--mut)">Date</label><input id="y_date" type="date" value="${esc(rec.date)}"/></div></div>
    <div class="f"><label style="font-size:11px;color:var(--mut)">File link</label><input id="y_link" value="${esc(rec.link)}" placeholder="SharePoint &rsaquo; Legal &rsaquo; ..."/></div>`}
  if(kind==="event"){rec=sid?c.events.find(x=>x.id===sid):{name:"",date:"",location:"",who:"",notes:""};title=sid?"Edit event":"Add event";
    fields=`<div class="f"><label style="font-size:11px;color:var(--mut)">Event name *</label><input id="y_name" value="${esc(rec.name)}"/></div>
    <div class="g2"><div class="f"><label style="font-size:11px;color:var(--mut)">Date</label><input id="y_date" type="date" value="${esc(rec.date)}"/></div>
    <div class="f"><label style="font-size:11px;color:var(--mut)">Location</label><input id="y_location" value="${esc(rec.location)}"/></div></div>
    <div class="f"><label style="font-size:11px;color:var(--mut)">Who's attending</label><input id="y_who" value="${esc(rec.who)}"/></div>
    <div class="f"><label style="font-size:11px;color:var(--mut)">Notes</label><textarea id="y_notes">${esc(rec.notes)}</textarea></div>`}
  m2in.innerHTML=`<h3>${title}</h3>${fields}<div class="mfoot"><button class="btn ghost" onclick="close2()">Cancel</button><button class="btn primary" onclick="saveSub('${kind}','${sid||''}')">Save</button></div>`;
  m2.classList.add("open");
}
async function saveSub(kind,sid){const c=company();const g=i=>{const e=document.getElementById(i);return e?e.value:""};
  if(kind==="contact"){const rec={name:g("y_name").trim(),role:g("y_role"),email:g("y_email"),phone:g("y_phone"),linkedin:g("y_linkedin"),last:g("y_last"),notes:g("y_notes")};if(!rec.name){alert("Name required");return}
    const fields={Title:rec.name,Company:c.name,Role:rec.role,Email:rec.email,Phone:rec.phone,LinkedIn:rec.linkedin,Notes:rec.notes};if(rec.last)fields.LastContact=rec.last+"T00:00:00Z";
    close2();
    try{if(sid){const ex=c.contacts.find(x=>x.id===sid);Object.assign(ex,rec);await graph("/sites/"+SITE+"/lists/Contacts/items/"+ex.spId+"/fields",{method:"PATCH",body:JSON.stringify(fields)});}
      else{const r=await graph("/sites/"+SITE+"/lists/Contacts/items",{method:"POST",body:JSON.stringify({fields})});rec.id=r.id;rec.spId=r.id;c.contacts.push(rec);}}catch(e){alert("Save failed: "+(e.message||e));}
    detailView();return;}
  let arr,rec;
  if(kind==="doc"){arr="docs";rec={type:g("y_type"),status:g("y_status"),date:g("y_date"),link:g("y_link")}}
  if(kind==="event"){arr="events";rec={name:g("y_name").trim(),date:g("y_date"),location:g("y_location"),who:g("y_who"),notes:g("y_notes")};if(!rec.name){alert("Event name required");return}}
  c[arr]=c[arr]||[];if(sid){Object.assign(c[arr].find(x=>x.id===sid),rec)}else{rec.id=id();c[arr].push(rec)}
  close2();detailView()}
async function delSub(arr,sid){if(!confirm("Remove this record?"))return;const c=company();if(arr==="contacts"){const ex=c.contacts.find(x=>x.id===sid);try{await graph("/sites/"+SITE+"/lists/Contacts/items/"+ex.spId,{method:"DELETE"});}catch(e){alert("Delete failed: "+(e.message||e));return;}}c[arr]=c[arr].filter(x=>x.id!==sid);detailView()}
function close1(){m1.classList.remove("open")}
function close2(){m2.classList.remove("open")}
function mapC(it){const f=it.fields||{};return{spId:it.id,id:it.id,name:f.Title||"",rel:f.RelationshipType||"Other",stage:f.Stage||"Prospecting",tier:f.Tier||"",fit:f.Fit||"",industry:f.CompanyType||"",website:f.Website||"",linkedin:f.LinkedIn||"",location:f.Location||"",owner:f.Owner||"",notes:f.Notes||"",custom:[{k:"US Registration",v:f.USRegistration||""},{k:"Phone",v:f.Phone||""},{k:"General email",v:f.GeneralEmail||""}].filter(x=>x.v),contacts:[],docs:[],events:[]};}
function mapK(it){const f=it.fields||{};return{spId:it.id,id:it.id,name:f.Title||"",role:f.Role||"",email:f.Email||"",phone:f.Phone||"",linkedin:f.LinkedIn||"",last:(f.LastContact||"").slice(0,10),notes:f.Notes||"",_company:f.Company||""};}
async function pageAll(url){let out=[];while(url){const j=await graph(url);out=out.concat(j.value||[]);url=j["@odata.nextLink"]?j["@odata.nextLink"].replace("https://graph.microsoft.com/v1.0",""):null;}return out;}
async function boot(){
  try{
    document.getElementById("detail").innerHTML='<div class="empty">Signing in and loading your SharePoint data...</div>';
    const s=await graph("/sites/unitedservicesenergy.sharepoint.com:/sites/UnitedServicesTeamHub");
    SITE=s.id;
    const comp=await pageAll("/sites/"+SITE+"/lists/Companies/items?$expand=fields&$top=200");
    const cont=await pageAll("/sites/"+SITE+"/lists/Contacts/items?$expand=fields&$top=200");
    DB.companies=comp.map(mapC).sort((a,b)=>a.name.localeCompare(b.name));
    cont.map(mapK).forEach(p=>{const o=DB.companies.find(c=>c.name===p._company);if(o)o.contacts.push(p);});
    render();detailView();if(DB.companies.length)pick(DB.companies[0].id);
  }catch(e){document.getElementById("detail").innerHTML='<div class="empty">Could not load data.<br>'+(e.message||e)+'</div>';}
}
initF(); boot();
</script>
